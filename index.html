
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AWG 1.5 Генератор</title>
    <meta name="description" content="Генератор конфигураций AWG 1.5 для AmneziaWG">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Twemoji Country Flags', sans-serif;
            padding: 1.5rem;
        }

        /* Главный контейнер */
        .glass-panel {
            max-width: 520px;
            width: 100%;
            background: rgba(15, 20, 30, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
        }

        /* Заголовок (минималистичный) */
        .title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .title h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #F5AF4A, #FF7B89);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title p {
            font-size: 0.8rem;
            color: rgba(220, 220, 240, 0.6);
            margin-top: 0.4rem;
        }

        /* Сетка кнопок */
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Стиль кнопок — стеклянный, с градиентом при наведении */
        .awg-btn {
            position: relative;
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 2rem;
            background: rgba(20, 28, 40, 0.7);
            backdrop-filter: blur(4px);
            color: #f0f3fa;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.3px;
            overflow: hidden;
        }

        /* Градиентная обводка при наведении */
        .awg-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 2rem;
            padding: 2px;
            background: linear-gradient(120deg, #F5AF4A, #FF7B89);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .awg-btn:hover::before {
            opacity: 1;
        }

        .awg-btn:hover {
            transform: translateY(-3px);
            background: rgba(30, 38, 55, 0.8);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .awg-btn:active {
            transform: translateY(1px);
        }

        /* Анимация загрузки */
        .button--loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .button--loading .button__text {
            visibility: hidden;
        }

        .button--loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #F5AF4A;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Всплывающее уведомление */
        .popup-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #ffd966;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 215, 100, 0.3);
            z-index: 9999;
            animation: floatUp 2.2s forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        /* Нижний колонтитул - еле заметный */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: rgba(180, 190, 210, 0.4);
        }

        /* адаптация */
        @media (max-width: 480px) {
            .glass-panel {
                padding: 1.5rem 1.2rem;
            }
            .awg-btn {
                font-size: 1rem;
                padding: 0.85rem 1rem;
            }
            .title h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="title">
        <h1>AWG 1.5</h1>
        <p>генерация конфигураций</p>
    </div>

    <div class="buttons-grid">
        <button id="generateButton2" class="awg-btn"><span class="button__text">AWG 1.5 (1 вариант)</span></button>
        <button id="generateButton3" class="awg-btn"><span class="button__text">AWG 1.5 (2 вариант)</span></button>
        <button id="generateButton4" class="awg-btn"><span class="button__text">AWG 1.5 (3 вариант)</span></button>
    </div>

    <div class="footer-note">
        ✦ приватно ✦ без логов ✦
    </div>
</div>

<script>
    // ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (без изменений логики) -------------------
    const generateRandomString = (length) => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    };

    // Кэш для ключей и данных (сессионный)
    const sessionCache = {
        keys: null,
        accountData: null,
        installId: null,
        fcmToken: null
    };

    const fetchWithTimeout = async (url, options = {}, timeout = 5000) => {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    };

    const extractKey = (data, keyName) =>
        data.match(new RegExp(`${keyName}:\\s(.+)`))?.[1].trim() || null;

    const fetchKeys = async () => {
        if (sessionCache.keys) return sessionCache.keys;
        const endpoints = [
            'https://keygen.warp-generator.workers.dev',
            'https://warp-generation.vercel.app/keys'
        ];
        let lastError;
        for (let i = 0; i < endpoints.length; i++) {
            try {
                const response = await fetchWithTimeout(endpoints[i]);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.text();
                const keys = {
                    publicKey: extractKey(data, 'PublicKey'),
                    privateKey: extractKey(data, 'PrivateKey'),
                };
                sessionCache.keys = keys;
                return keys;
            } catch (err) {
                lastError = err;
                if (i === endpoints.length - 1) throw lastError;
            }
        }
        throw lastError;
    };

    const fetchAccount = async (publicKey, installId, fcmToken) => {
        if (sessionCache.accountData && sessionCache.keys?.publicKey === publicKey) {
            return sessionCache.accountData;
        }
        const endpoints = [
            'https://www.warp-generator.workers.dev/wg',
            'https://warp.sub-aggregator.workers.dev/wg',
            'https://warp-generation.vercel.app/wg'
        ];
        let lastError;
        for (let i = 0; i < endpoints.length; i++) {
            try {
                const response = await fetchWithTimeout(endpoints[i], {
                    method: 'POST',
                    headers: {
                        'User-Agent': 'okhttp/3.12.1',
                        'CF-Client-Version': 'a-6.10-2158',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        key: publicKey,
                        install_id: installId,
                        fcm_token: fcmToken,
                        tos: new Date().toISOString(),
                        model: 'PC',
                        serial_number: installId,
                        locale: 'de_DE',
                    }),
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const accountData = await response.json();
                sessionCache.accountData = accountData;
                return accountData;
            } catch (err) {
                lastError = err;
                if (i === endpoints.length - 1) throw lastError;
            }
        }
        throw lastError;
    };

    // Генерация эндпоинта (сервер по умолчанию - стандартный Cloudflare)
    function generateRandomEndpoint() {
        const ports = [500, 854, 859, 864, 878, 880, 890, 891, 894, 903, 908, 928, 934, 939, 942, 943, 945, 946, 955, 968, 987, 988, 1002, 1010, 1014, 1018, 1070, 1074, 1180, 1387, 1701, 1843, 2371, 2408, 2506, 3138, 3476, 3581, 3854, 4177, 4198, 4233, 4500, 5279, 5956, 7103, 7152, 7156, 7281, 7559, 8319, 8742, 8854, 8886];
        const port = ports[Math.floor(Math.random() * ports.length)];
        const prefixes = ["162.159.192.", "162.159.195.", "engage.cloudflareclient.com"];
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        if (prefix === "engage.cloudflareclient.com") {
            return `${prefix}:${port}`;
        } else {
            const randomNumber = Math.floor(Math.random() * 10) + 1;
            return `${prefix}${randomNumber}:${port}`;
        }
    }

    // DNS по умолчанию (1.1.1.1)
    function getSelectedDNS() {
        return "1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001";
    }

    // AllowedIPs по умолчанию (весь трафик)
    function getSelectedSites() {
        return "0.0.0.0/0, ::/0";
    }

    // Выбор сервера — только стандартный режим (без кастомных доменов)
    function getSelectedServer() {
        return 'def';
    }

    // Случайные Jc параметры (используется в варианте 2 и 3, но оставляем для единообразия)
    function getRandomJcParams() {
        const options = [
            "Jc = 4\nJmin = 40\nJmax = 70",
            "Jc = 120\nJmin = 23\nJmax = 911"
        ];
        return options[Math.floor(Math.random() * options.length)];
    }

    // Генерация reserved (для совместимости, в AWG-конфигах не нужна, но функция остаётся)
    const generateReserved = (clientId) =>
        Array.from(atob(clientId))
            .map((char) => char.charCodeAt(0))
            .slice(0, 3)
            .join(', ');

    // Уведомление
    const showPopup = (message, type = 'success') => {
        const popup = document.createElement('div');
        popup.className = 'popup-message';
        popup.textContent = message;
        if (type === 'error') popup.style.background = "rgba(180, 40, 40, 0.9)";
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2200);
    };

    // Скачивание файла
    const downloadConfig = (fileName, content) => {
        const blob = new Blob([content], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    };

    // ------------------- ОБРАБОТЧИКИ ТРЁХ КНОПОК (оригинальная логика) -------------------
    // Общая функция для загрузки ключей и аккаунта
    async function prepareConfig() {
        const { publicKey, privateKey } = await fetchKeys();
        const installId = generateRandomString(22);
        const fcmToken = `${installId}:APA91b${generateRandomString(134)}`;
        const accountData = await fetchAccount(publicKey, installId, fcmToken);
        return { privateKey, accountData };
    }

    // Кнопка 1 вариант (AWGm1)
    document.getElementById('generateButton2').addEventListener('click', async () => {
        const btn = document.getElementById('generateButton2');
        btn.disabled = true;
        btn.classList.add("button--loading");

        try {
            const { privateKey, accountData } = await prepareConfig();
            const selectedDNS = getSelectedDNS();
            const allowedIPs = getSelectedSites();
            const randomEndpoint = generateRandomEndpoint();

            const wireGuardText = `[Interface]

[Peer]
PublicKey = ${accountData.config.peers[0].public_key}
AllowedIPs = ${allowedIPs}
Endpoint = ${randomEndpoint}`;

            downloadConfig(`WARPm1_${randomNumber}.conf`, wireGuardText);
            showPopup('✓ Конфигурация скачана (вариант 1)');
        } catch (error) {
            console.error(error);
            showPopup('❌ Ошибка генерации. Попробуйте позже.', 'error');
        } finally {
            btn.disabled = false;
            btn.classList.remove("button--loading");
        }
    });
