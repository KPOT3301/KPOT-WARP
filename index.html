<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AWG 1.5 Генератор</title>
    <meta name="description" content="Генератор конфигураций AWG 1.5 для AmneziaWG">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Twemoji Country Flags', sans-serif;
            padding: 1.5rem;
        }

        /* Главный контейнер */
        .glass-panel {
            position: relative;
            max-width: 520px;
            width: 100%;
            background: rgba(15, 20, 30, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
        }

        /* Кнопка настроек (шестерёнка) */
        .settings-icon {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            width: 38px;
            height: 38px;
            background: rgba(30, 38, 55, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
        }
        .settings-icon:hover {
            background: rgba(245, 175, 74, 0.25);
            transform: rotate(15deg);
            border-color: #F5AF4A;
        }
        .settings-icon svg {
            width: 22px;
            height: 22px;
            stroke: #eef2ff;
            stroke-width: 1.8;
            fill: none;
        }
        .settings-icon:hover svg {
            stroke: #F5AF4A;
        }

        /* Заголовок */
        .title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .title h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #F5AF4A, #FF7B89);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title p {
            font-size: 0.8rem;
            color: rgba(220, 220, 240, 0.6);
            margin-top: 0.4rem;
        }

        /* Сетка кнопок */
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Стиль кнопок AWG */
        .awg-btn {
            position: relative;
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 2rem;
            background: rgba(20, 28, 40, 0.7);
            backdrop-filter: blur(4px);
            color: #f0f3fa;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.3px;
            overflow: hidden;
        }
        .awg-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 2rem;
            padding: 2px;
            background: linear-gradient(120deg, #F5AF4A, #FF7B89);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .awg-btn:hover::before {
            opacity: 1;
        }
        .awg-btn:hover {
            transform: translateY(-3px);
            background: rgba(30, 38, 55, 0.8);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .awg-btn:active {
            transform: translateY(1px);
        }

        .button--loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .button--loading .button__text {
            visibility: hidden;
        }
        .button--loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #F5AF4A;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Модальное окно (тёмное стекло) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(16px);
            margin: 5% auto;
            padding: 24px 20px;
            border-radius: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            position: relative;
            color: #eef2ff;
        }
        .close {
            position: absolute;
            right: 18px;
            top: 12px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .close:hover {
            color: #F5AF4A;
        }
        .modal-line {
            font-weight: 600;
            margin: 18px 0 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 6px;
        }
        .dnsinfo, .Sites {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 6px;
        }
        .payment-option, .server-option {
            background: rgba(30, 38, 55, 0.7);
            border-radius: 40px;
            padding: 8px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        .payment-option--checked, .payment-option:has(input:checked),
        .server-option--checked, .server-option:has(input:checked) {
            background: linear-gradient(120deg, #F5AF4A, #FF7B89);
            color: #0a0f1e;
            font-weight: 500;
            border-color: transparent;
        }
        .payment-radio, .server-radio {
            display: none;
        }
        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .toggle-switch {
            width: 48px;
            height: 26px;
            background: #2a2f3f;
            border-radius: 40px;
            position: relative;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toggle-switch:before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background: #eef2ff;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-checkbox:checked + .toggle-switch {
            background: #F5AF4A;
        }
        .toggle-checkbox:checked + .toggle-switch:before {
            left: 23px;
            background: #0a0f1e;
        }
        .toggle-checkbox {
            display: none;
        }
        .toggle-label {
            font-size: 0.9rem;
        }
        .info2 {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: rgba(220, 220, 240, 0.5);
        }
        .info2 a {
            color: #F5AF4A;
            text-decoration: none;
        }

        /* всплывающее уведомление */
        .popup-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: #ffd966;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 215, 100, 0.3);
            z-index: 9999;
            animation: fadeUp 2.2s forwards;
            pointer-events: none;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: rgba(180, 190, 210, 0.4);
        }
        @media (max-width: 500px) {
            .dnsinfo, .Sites { grid-template-columns: repeat(2, 1fr); }
            .glass-panel { padding: 1.5rem; }
            .awg-btn { font-size: 1rem; }
        }
    </style>
</head>

<script>
    // ------------------- ОРИГИНАЛЬНЫЕ ФУНКЦИИ НАСТРОЕК -------------------
    function getSelectedDNS() {
        if (document.getElementById('cf').checked) return "1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001";

    function getSelectedServer() {
        const servers = document.getElementsByName('server');
        for (let s of servers) if (s.checked) return s.id;
        return 'def';
    }

    function generateRandomEndpoint() {
        const ports = [500, 854, 859, 864, 878, 880, 890, 891, 894, 903, 908, 928, 934, 939, 942, 943, 945, 946, 955, 968, 987, 988, 1002, 1010, 1014, 1018, 1070, 1074, 1180, 1387, 1701, 1843, 2371, 2408, 2506, 3138, 3476, 3581, 3854, 4177, 4198, 4233, 4500, 5279, 5956, 7103, 7152, 7156, 7281, 7559, 8319, 8742, 8854, 8886];
        const selectedServer = getSelectedServer();
        let port = ports[Math.floor(Math.random() * ports.length)];
        if (selectedServer === 'def') {
            const prefixes = ["162.159.192.", "162.159.195.", "engage.cloudflareclient.com"];
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            if (prefix === "engage.cloudflareclient.com") return `${prefix}:${port}`;
            const randomNumber = Math.floor(Math.random() * 10) + 1;
            return `${prefix}${randomNumber}:${port}`;
        }
        const serverMap = {
            'PL': 'pl.tribukvy.ltd', 'DE': 'de.tribukvy.ltd', 'RU': 'ru0.tribukvy.ltd',
            'EE': 'ee.tribukvy.ltd', 'NL1': 'nl0.tribukvy.ltd', 'NL2': 'nl.tribukvy.ltd',
            'FL1': 'fi0.tribukvy.ltd', 'FL2': 'fi.tribukvy.ltd'
        };
        const endpoint = serverMap[selectedServer] || 'de.tribukvy.ltd';
        return `${endpoint}:${port}`;
    }

    // ------------------- БАЗОВЫЕ ФУНКЦИИ ГЕНЕРАЦИИ -------------------
    const sessionCache = { keys: null, accountData: null, installId: null };
    const fetchWithTimeout = async (url, options = {}, timeout = 5000) => {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const res = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return res;
        } catch (e) { clearTimeout(id); throw e; }
    };
    const extractKey = (data, keyName) => data.match(new RegExp(`${keyName}:\\s(.+)`))?.[1]?.trim() || null;
    const fetchKeys = async () => {
        if (sessionCache.keys) return sessionCache.keys;
        const endpoints = ['https://keygen.warp-generator.workers.dev', 'https://warp-generation.vercel.app/keys'];
        for (let ep of endpoints) {
            try {
                const res = await fetchWithTimeout(ep);
                if (!res.ok) throw new Error();
                const txt = await res.text();
                const keys = { publicKey: extractKey(txt, 'PublicKey'), privateKey: extractKey(txt, 'PrivateKey') };
                sessionCache.keys = keys;
                return keys;
            } catch {}
        }
        throw new Error('Failed to fetch keys');
    };
    const generateRandomString = (len) => {
        if (sessionCache.installId && sessionCache.installId.length === len) return sessionCache.installId;
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let res = '';
        for (let i = 0; i < len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
        if (len === 22) sessionCache.installId = res;
        return res;
    };
    const fetchAccount = async (publicKey, installId, fcmToken) => {
        if (sessionCache.accountData && sessionCache.keys?.publicKey === publicKey) return sessionCache.accountData;
        const endpoints = ['https://www.warp-generator.workers.dev/wg', 'https://warp.sub-aggregator.workers.dev/wg', 'https://warp-generation.vercel.app/wg'];
        for (let ep of endpoints) {
            try {
                const res = await fetchWithTimeout(ep, {
                    method: 'POST',
                    headers: { 'User-Agent': 'okhttp/3.12.1', 'CF-Client-Version': 'a-6.10-2158', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: publicKey, install_id: installId, fcm_token: fcmToken, tos: new Date().toISOString(), model: 'PC', serial_number: installId, locale: 'de_DE' })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                sessionCache.accountData = data;
                return data;
            } catch {}
        }
        throw new Error('Failed to fetch account');
    };
    const prepareConfig = async () => {
        const { publicKey, privateKey } = await fetchKeys();
        const installId = generateRandomString(22);
        const fcmToken = `${installId}:APA91b${generateRandomString(134)}`;
        const accountData = await fetchAccount(publicKey, installId, fcmToken);
        return { privateKey, accountData };
    };
    const showPopup = (msg, err = false) => {
        const popup = document.createElement('div');
        popup.className = 'popup-message';
        popup.textContent = msg;
        if (err) popup.style.background = "rgba(180,40,40,0.9)";
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2200);
    };
    const downloadConfig = (name, content) => {
        const blob = new Blob([content], { type: 'application/octet-stream' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    };

    // Обработчики кнопок

            const dns = getSelectedDNS();

            const endpoint = generateRandomEndpoint();

            else if (variantNumber === 2) wireguardText += `I1 = <b 0xc7000000010809a1ed4edbbe7615000044d017a61a0d774f04290f119e701ef0035df2b0ed571b0b575e6a07246b856eb6ec036fef07f1e07b861251ad737abeb67e64be714c1dcd865312b1b6c35c089c997aeb5c18f808696fe97289513945d84ca846467603e94e44224877f2c1d3261e4ac18740be4bd064369c94fc08978d99b54bf615250998639010c1284248e1d73004b81fcb20b559d8a17eced7eab3964b5b88ca7a3b8579fc8c1c934189e77143b4ac434138114b1048651b56545b87acbef0952763538f3ddeb37cfc6d58b4881c3b719d7ff78f6ee1324a2914a32381c05a64c700466d280be007253bb030d179c4f1b3dc221e1974e2ee6d6e2b9e8d709159b5ef22e1783dbba845c20ca1c83b066c73835920ad70b806df0aee0351e3fc9ab1e42e8b2a30fe235ff0612eee19744949cecee0463b76514ad90c1f7ceaa557c18586ab561d49482e73c85d0143785da14a441bf82f78783b61cccd44aecb1947516e79b5ca5a6b3a8aed6040fae0eeabdc55a88dc19ade832d99fca90c7a629cacc07192d7e47e3c6a271b95b0ea3392562a06a1cab79f40ea92916ebee197b7b5f14b251824e1ed20ff2ca80b1f03a43e45157589bc61b978e97851025b3b7ccc17d291e1cb60fe48a5c26829dce11dd23c2e73265a9ebf8617c985e4fee4681e863f990061f4dea465a7d2524bd0edcf4b48d4b8f25fc359b15babd2637284a4774077dca60091f1a781cfee1bef9713dd5943a579d7470bc5970542fbb27fdf77880a8d8751b1f642c7a3f019a05ab94bf63d3525ef34e9290b5c8d477f2714e6d6e3e4d35c1983f5e16fda57fcdf071b513f8f088dbe8d5a97577d17a5383a496c3f313adfdd47c962bbaebd6aa13b46439eb742622c29ca067db0ec1853064c3cbbffe0a215a19fce47d49703ed58ebbd89721172d256d1cf30188106fb2f863186511401fad54d087aa2fb3d1b85768db386bd7102e8060ac157bac011acdcdae2799b9aee1467c3424013455bd028fcaacdc3c77d28ea199967d617ea7d0d0815f3cc407934a76d1293dccba210d1709a13e5dd67c9ba47cd113f5bdd740358eff13164159fd09bc2f7ec6cfa64d9df7e2e2f88706b0ff3a92ccf6f078456cfe0bdd89292cfe2680badc1eac9f7d36efe8eb6912c7b164508d13e6c0911c15f73c233cbe4fc70ff2ade1e1be4bbb738e0939159e2078a9438f05b756a003371f4861481c38f1cdd2d7b06deb62869e9fe79a8abaa920646fa2e8fa28f0d80c136376c7b56046bae4c05c0cdf64efb8c47bbfc5a1a4c0b045061ef0d71618e0d206a1d7f245fd5c03191b152673ba8dff8e1b8de7c50234a93cba9             else if (variantNumber === 3) wireguardText += `I1 = <b 0x494e56495445207369703a626f624062696c6f78692e636f6d205349502f322e300d0a5669613a205349502f322e302f55445020706333332e61746c616e74612e636f6d3b6272616e63683d7a39684734624b3737366173646864730d0a4d61782d466f7277617264733a2037300d0a546f3a20426f62203c7369703a626f624062696c6f78692e636f6d3e0d0a46726f6d3a20416c696365203c7369703a616c6963654061746c616e74612e636f6d3e3b7461673d313932383330313737340d0a43616c6c2d49443a20613834623463373665363637313040706333332e61746c616e74612e636f6d0d0a435365713a2033313431353920494e564954450d0a436f6e746163743a203c7369703a616c69636540706333332e61746c616e74612e636f6d3e0d0a436f6e74656e742d547970653a206170706c69636174696f6e2f7364700d0a436f6e74656e742d4c656e6774683a20300d0a0d0a>\nI2 = <b 0x5349502f322e302031303020547279696e670d0a5669613a205349502f322e302f55445020706333332e61746c616e74612e636f6d3b6272616e63683d7a39684734624b3737366173646864730d0a546f3a20426f62203c7369703a626f624062696c6f78692e636f6d3e0d0a46726f6d3a20416c696365203c7369703a616c6963654061746c616e74612e636f6d3e3b7461673d313932383330313737340d0a43616c6c2d49443a20613834623463373665363637313040706333332e61746c616e74612e636f6d0d0a435365713a2033313431353920494e564954450d0a436f6e74656e742d4c656e6774683a20300d0a0d0a>\n`;
            wireguardText += `[Peer]\nPublicKey = ${accountData.config.peers[0].public_key}\nAllowedIPs = ${allowed}\nEndpoint = ${endpoint}`;
            downloadConfig(`WARPm${variantNumber}_${rnd}.conf`, wireguardText);
            showPopup(`✓ Конфигурация (вариант ${variantNumber}) скачана`);
        } catch(e) {
            console.error(e);
            showPopup('❌ Ошибка генерации', true);
        } finally {
            btn.disabled = false;
            btn.classList.remove("button--loading");
        }
    }

    document.getElementById('generateButton2').onclick = () => generateVariant('generateButton2', 1);
    document.getElementById('generateButton3').onclick = () => generateVariant('generateButton3', 2);
    document.getElementById('generateButton4').onclick = () => generateVariant('generateButton4', 3);

    // Модальное окно
    const modal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSpan = document.querySelector('.close');
    settingsBtn.onclick = () => { modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; };
    closeSpan.onclick = () => { modal.style.display = 'none'; document.body.style.overflow = ''; };
    window.onclick = (e) => { if (e.target === modal) { modal.style.display = 'none'; document.body.style.overflow = ''; } };

    // Визуальное отображение выбранных радио/чекбоксов
    function updateVisuals() {
        document.querySelectorAll('.payment-option, .server-option').forEach(opt => {
            const inp = opt.querySelector('input');
            if (inp && inp.checked) opt.classList.add('payment-option--checked');
            else opt.classList.remove('payment-option--checked');
        });
    }
    document.querySelectorAll('.payment-option, .server-option').forEach(el => {
        el.addEventListener('click', (e) => {
            const inp = el.querySelector('input');
            if (inp && inp.type === 'radio') inp.checked = true;
            else if (inp && inp.type === 'checkbox') inp.checked = !inp.checked;
            updateVisuals();
        });
    });
    updateVisuals();

    // Логика блокировки серверов при выборе блокирующего DNS (как в оригинале)
    function isBlockingDNS() {
        const blocking = ['comss', 'geohide', 'xbox', 'malw'];
        const selected = document.querySelector('input[name="payment"]:checked');
        return selected && blocking.includes(selected.id);
    }
    function updateServerAndSitesLock() {
        const blocking = isBlockingDNS();
        const serverRadios = document.querySelectorAll('input[name="server"]');
        const siteCheckboxes = document.querySelectorAll('#sitesContainer input');
        serverRadios.forEach(r => r.disabled = blocking);
        siteCheckboxes.forEach(c => c.disabled = blocking);
        const serverOptions = document.querySelectorAll('.server-option');
        serverOptions.forEach(opt => opt.style.opacity = blocking ? '0.5' : '1');
        const siteLabels = document.querySelectorAll('#sitesContainer .payment-option');
        siteLabels.forEach(l => l.style.opacity = blocking ? '0.5' : '1');
        if (blocking) {
            document.getElementById('def').checked = true;
            updateVisuals();
        }
    }
    document.querySelectorAll('input[name="payment"]').forEach(r => r.addEventListener('change', updateServerAndSitesLock));
    updateServerAndSitesLock();

    // Управление toggle "Исключить LAN"
    function updateToggleState() {
        const toggle = document.getElementById('rules');
        const anySiteChecked = Array.from(document.querySelectorAll('#sitesContainer input')).some(cb => cb.checked);
        if (anySiteChecked) {
            toggle.disabled = true;
            toggle.checked = false;
        } else {
            toggle.disabled = false;
        }
    }
    document.querySelectorAll('#sitesContainer input').forEach(cb => cb.addEventListener('change', updateToggleState));
    updateToggleState();
</script>
