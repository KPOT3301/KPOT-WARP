<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WARP Генератор для AmneziaWG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="telegram-warning" id="telegramWarning" style="display: none;">
        ⚠️ Не открывайте сайт через встроенный браузер Telegram, иначе скачивание не сработает.<br>
        Нажмите три точки → «Открыть в браузере».
    </div>

    <div class="container">
        <h1>WARP Генератор</h1>
        <p class="subtitle">Выберите тип конфигурации</p>

        <div class="button-group">
            <button class="config-btn" data-type="amneziawg">AmneziaWG</button>
            <button class="config-btn" data-type="clash">Clash</button>
            <button class="config-btn" data-type="wiresock">WireSock</button>
        </div>

        <div class="preview-area">
            <pre id="configPreview">Нажмите на кнопку, чтобы сгенерировать конфиг...</pre>
        </div>

        <button id="downloadBtn" class="download-btn" disabled>Скачать файл</button>
    </div>

    <footer>
        Генератор для AmneziaWG 1.5
    </footer>

    <script src="script.js"></script>
</body>
</html>
